spring:
  application:
    name: ai-agent
  profiles:
    active: local
#  datasource:
#    url: ${DB_URL:}
#    username: ${DB_USERNAME:}
#    password: ${DB_PASSWORD:}
  ai:
    dashscope:
      # 建议通过环境变量注入真实 API Key
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus-latest
    openai:
      # 前端用户自行填写；此处使用 dummy 避免自动配置异常
      api-key: ${OPENAI_API_KEY:dummy}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dummy}
    tavily:
      # Tavily Search API，可选；未配置时会降级到 HTML 搜索引擎
      api-key: ${TAVILY_API_KEY:}
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
    mcp:
       client:
#         sse:
#            connections:
#              server1:
#                url: http://localhost:8127
         stdio:
           servers-configuration: classpath:mcp-servers.json
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
server:
  port: 8123
  servlet:
    context-path: /api
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.aiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
# 调试阶段保留 Spring AI 日志，生产环境可调整为 INFO
logging:
  level:
    org.springframework.ai: DEBUG

app:
  default-chat:
    # Optional production override. Keep secrets in environment variables.
    provider: ${DEFAULT_CHAT_PROVIDER:}
    api-key: ${DEFAULT_CHAT_API_KEY:}
    model-name: ${DEFAULT_CHAT_MODEL:}
    base-url: ${DEFAULT_CHAT_BASE_URL:}
  rag:
    # Set to false in production when the embedding provider is unavailable.
    index-on-startup: ${RAG_INDEX_ON_STARTUP:true}
